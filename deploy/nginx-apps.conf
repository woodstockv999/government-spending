# ───────────────────────────────────────────────────────────────
#  210.131.212.62 配下に複数アプリをパスで相乗り（リバースプロキシ）
#    /            → ランディング（両アプリへのリンク）
#    /briefing/   → briefing-bot   (127.0.0.1:3000, NEXT_BASE_PATH=/briefing)
#    /marumie/    → marumie-jp     (127.0.0.1:3001, NEXT_BASE_PATH=/marumie)
#
#  配置（root）:
#    cp deploy/nginx-apps.conf /etc/nginx/sites-available/apps
#    rm -f /etc/nginx/sites-enabled/briefing-bot      # 旧:ルート占有を解除
#    ln -sf /etc/nginx/sites-available/apps /etc/nginx/sites-enabled/apps
#    nginx -t && systemctl reload nginx
#
#  前提: 各 Next アプリを basePath 付きで再ビルド済み（deploy/deploy-subpath.sh 参照）。
# ───────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    proxy_read_timeout 300s;
    proxy_connect_timeout 75s;

    # 共通プロキシヘッダ
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;

    # 業界ブリーフィング Bot
    location /briefing/ {
        proxy_pass http://127.0.0.1:3000;
    }
    location = /briefing {
        return 301 /briefing/;
    }

    # 国家予算まる見え
    location /marumie/ {
        proxy_pass http://127.0.0.1:3001;
    }
    location = /marumie {
        return 301 /marumie/;
    }

    # ルート: 簡易ランディング
    location = / {
        default_type text/html;
        return 200 '<!doctype html><html lang="ja"><meta charset="utf-8"><title>アプリ一覧</title><body style="font-family:sans-serif;max-width:640px;margin:60px auto;padding:0 20px"><h1>アプリ一覧</h1><ul style="font-size:1.1rem;line-height:2"><li><a href="/marumie/">国家予算まる見え（marumie）</a></li><li><a href="/briefing/">業界ブリーフィング Bot（briefing）</a></li></ul></body></html>';
    }
}
